name: Deploy to Cloudflare Pages

# Triggers on push to main when commit message contains --cloudflare,
# or manually from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:

  # ── 1. Decide whether to actually deploy ────────────────────────────────────
  parse-trigger:
    runs-on: ubuntu-latest
    outputs:
      run_deploy: ${{ steps.decide.outputs.run_deploy }}
    steps:
      - name: Decide
        id: decide
        run: |
          RUN=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RUN=true
          else
            MSG="${{ github.event.head_commit.message }}"
            echo "$MSG" | grep -qiE '\-\-cloudflare\b' && RUN=true || true
          fi
          echo "run_deploy=$RUN" >> $GITHUB_OUTPUT
          echo "Run deploy: $RUN"

  # ── 2. Build SvelteKit site and deploy ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: parse-trigger
    if: needs.parse-trigger.outputs.run_deploy == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build SvelteKit
        run: cd web && npm run build

      - name: Verify build output
        run: |
          echo "=== Cloudflare output ==="
          ls -la web/.svelte-kit/cloudflare/
          echo "=== Worker file ==="
          ls -lh web/.svelte-kit/cloudflare/_worker.js || echo "WARNING: _worker.js missing"

      - name: Create Pages project if needed
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd web
          npx wrangler pages project create mdix-converter \
            --production-branch=main 2>&1 || echo "Project exists, continuing"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd web
          npx wrangler pages deploy .svelte-kit/cloudflare \
            --project-name=mdix-converter \
            --branch=main \
            --commit-dirty=true

  # ── 3. Summary ──────────────────────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    needs: [parse-trigger, deploy]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "================================================="
          echo "  mdix-converter — Deploy Summary"
          echo "================================================="
          echo "Build:   #${{ github.run_number }}"
          echo "Branch:  ${{ github.ref_name }}"
          echo "Trigger: ${{ github.event_name }}"
          echo "Deploy:  ${{ needs.deploy.result || 'skipped' }}"
          echo ""
          if [ "${{ needs.parse-trigger.outputs.run_deploy }}" != "true" ]; then
            echo "Skipped — add --cloudflare to commit message to trigger deploy."
          fi
