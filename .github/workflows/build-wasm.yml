name: Build WASM

# Triggers on any change to the Rust crates.
# Builds converter-wasm with wasm-pack and commits the output directly
# into web/src/lib/wasm/ so the SvelteKit site can import it.

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: |
          wasm-pack build crates/converter-wasm \
            --target web \
            --out-dir ../../web/src/lib/wasm \
            --release

          # wasm-pack writes a .gitignore that would hide the output —
          # remove it so the generated files can be committed.
          rm -f web/src/lib/wasm/.gitignore

      - name: Show output
        run: |
          echo "=== WASM output ==="
          ls -lh web/src/lib/wasm/

      - name: Commit WASM artefacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/src/lib/wasm/
          if git diff --staged --quiet; then
            echo "WASM output unchanged — nothing to commit."
          else
            git commit -m "chore: rebuild WASM [skip ci]"
            git push
          fi
